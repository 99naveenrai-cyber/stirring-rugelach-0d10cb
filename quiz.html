<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdeaKDC - Quiz</title>
<style>
:root{--ink:#1c2321;--paper:#fafaf7;--panel:#fff;--line:#e6e2d8;--teal:#1e5f5a;--teal-light:#e4f0ee;--correct:#1e8f5f;--correct-light:#e1f6eb;--wrong:#b23a2e;--wrong-light:#fbeae8;--mustard:#b8860b}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--paper);color:var(--ink);display:flex;justify-content:center;padding:20px}.quiz-wrap{width:100%;max-width:640px}.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.title{font-weight:800;font-size:17px}.mode-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}.mode-tab{padding:9px 16px;border-radius:999px;border:1.5px solid var(--line);background:var(--panel);font-size:13px;font-weight:700;cursor:pointer;color:var(--ink)}.mode-tab.selected{background:var(--ink);color:#fff;border-color:var(--ink)}.progress-track{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:22px}.progress-fill{height:100%;background:var(--teal);transition:width .3s}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px 24px;box-shadow:0 1px 3px rgba(0,0,0,.03)}.qnum{font-size:12px;color:var(--mustard);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}.qtext{font-size:17px;font-weight:700;line-height:1.45;margin-bottom:20px}.option{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:10px;cursor:pointer;font-size:14.5px;transition:.15s;position:relative}.option:hover{border-color:var(--teal)}.letter{width:26px;height:26px;border-radius:50%;background:var(--paper);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800;flex-shrink:0}.correct-glow{border-color:var(--correct);background:var(--correct-light);animation:glowPulse 1.1s}.correct-glow .letter{background:var(--correct);color:#fff;border-color:var(--correct)}.wrong-shake{border-color:var(--wrong);background:var(--wrong-light);animation:shake .4s}.wrong-shake .letter{background:var(--wrong);color:#fff;border-color:var(--wrong)}.disabled{pointer-events:none}.faded{opacity:.45}@keyframes glowPulse{0%{box-shadow:0 0 0 0 rgba(30,143,95,.5)}50%{box-shadow:0 0 0 10px rgba(30,143,95,0)}100%{box-shadow:0 0 0 0 rgba(30,143,95,0)}}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.explanation{margin-top:14px;padding:12px 14px;background:var(--teal-light);border-radius:8px;font-size:13.5px;color:var(--ink);display:none}.explanation.show{display:block}.next-row{margin-top:20px;text-align:right}.next-btn{background:var(--teal);color:#fff;border:0;border-radius:8px;padding:11px 22px;font-size:13.5px;font-weight:800;cursor:pointer;opacity:0;pointer-events:none;transition:.2s}.next-btn.show{opacity:1;pointer-events:auto}.result-card{text-align:center;padding:40px 24px}.score{font-size:42px;font-weight:900;color:var(--teal)}.label{color:#666;margin-bottom:20px}.retry-btn{background:var(--ink);color:#fff;border:0;border-radius:8px;padding:11px 22px;font-size:13.5px;font-weight:800;cursor:pointer}.video-stage{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden;margin-bottom:16px;--popup-height:75%}.video-stage iframe,.video-stage video{width:100%;height:100%;border:0;display:block}.popup-overlay{position:absolute;left:0;right:0;bottom:0;height:var(--popup-height);background:rgba(15,20,18,.3);backdrop-filter:blur(18px) saturate(150%);border-radius:22px 22px 0 0;display:flex;align-items:center;justify-content:center;padding:18px;transform:translateY(100%);opacity:0;pointer-events:none;transition:.5s;overflow:hidden}.popup-overlay.show{transform:translateY(0);opacity:1;pointer-events:auto}.popup-overlay.dull{filter:grayscale(.55) brightness(.72);opacity:.55}.popup-card{background:rgba(255,255,255,.9);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.5);border-radius:14px;padding:18px 18px 14px;width:100%;max-width:440px;max-height:92%;overflow:auto;position:relative}.popup-card .qtext{font-size:15.5px;margin-bottom:14px}.popup-card .option{padding:10px 13px;font-size:13.5px;margin-bottom:8px}.placeholder{text-align:center;color:#777;padding:60px 0}.confetti-piece{position:absolute;will-change:transform,opacity}@media(max-width:520px){body{padding:12px}.card{padding:20px 16px}.qtext{font-size:16px}}
</style>
</head>
<body>
<div class="quiz-wrap"><div class="topbar"><div class="title" id="quizTitle">Quiz</div></div><div class="mode-tabs" id="modeTabs"></div><div id="videoArea"></div><div class="progress-track" id="progressTrack" style="display:none"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div id="quizArea"></div></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const CONTENT_BASE='./data/content/';const params=new URLSearchParams(location.search);const nodeId=params.get('node');const title=params.get('title')||'Quiz';document.getElementById('quizTitle').textContent=title;let questions=[],videoUrl=null,quizMode=null,timestamps=null,current=0,score=0,answered=false,ytPlayer=null,firedTimestamps=new Set,pollInterval=null;
async function loadQuiz(){if(!nodeId){document.getElementById('quizArea').innerHTML='<div class="placeholder">No section selected.</div>';return}let data;try{const res=await fetch(`${CONTENT_BASE}${nodeId}.json`,{cache:'no-store'});if(!res.ok)throw new Error('not found');data=await res.json()}catch(err){document.getElementById('quizArea').innerHTML='<div class="placeholder">Nothing uploaded for this section yet.</div>';return}questions=Array.isArray(data.questions)?data.questions:[];videoUrl=data.videoUrl||null;quizMode=data.quizMode||null;timestamps=data.timestamps||null;buildModeTabs()}function isYouTube(url){return/youtube\.com|youtu\.be/.test(url)}function buildModeTabs(){const tabs=document.getElementById('modeTabs');tabs.innerHTML='';const options=[];if(videoUrl)options.push({id:'video',label:'Watch video'});if(questions.length)options.push({id:'quiz',label:'Take quiz'});if(videoUrl&&questions.length&&quizMode==='popup'&&timestamps)options.push({id:'both',label:'Watch + quiz together'});if(!options.length){document.getElementById('quizArea').innerHTML='<div class="placeholder">Nothing uploaded for this section yet.</div>';return}options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='mode-tab'+(i===0?' selected':'');btn.textContent=opt.label;btn.onclick=()=>{document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');setMode(opt.id)};tabs.appendChild(btn)});if(options.length===1)tabs.style.display='none';setMode(options[0].id)}function setMode(mode){stopPolling();const videoArea=document.getElementById('videoArea'),quizArea=document.getElementById('quizArea'),progressTrack=document.getElementById('progressTrack');videoArea.innerHTML='';quizArea.innerHTML='';progressTrack.style.display='none';if(mode==='video')videoArea.appendChild(buildVideoStage(false));else if(mode==='quiz'){progressTrack.style.display='block';current=0;score=0;renderQuestion()}else if(mode==='both')videoArea.appendChild(buildVideoStage(true))}function buildVideoStage(withPopups){const stage=document.createElement('div');stage.className='video-stage';if(isYouTube(videoUrl)){const container=document.createElement('div');container.id='ytPlayerContainer';stage.appendChild(container);initYouTubePlayer(videoUrl,withPopups)}else{const video=document.createElement('video');video.src=videoUrl;video.controls=true;stage.appendChild(video);if(withPopups)attachNativeVideoPopups(video)}if(withPopups){const overlay=document.createElement('div');overlay.className='popup-overlay';overlay.id='popupOverlay';stage.appendChild(overlay);firedTimestamps=new Set;updatePopupSizing(stage);window.addEventListener('resize',()=>updatePopupSizing(stage))}return stage}function attachNativeVideoPopups(videoEl){videoEl.addEventListener('timeupdate',()=>checkTimestamps(videoEl.currentTime,()=>videoEl.pause(),()=>videoEl.play()))}function initYouTubePlayer(url,withPopups){const videoId=extractYouTubeId(url);const start=()=>{ytPlayer=new YT.Player('ytPlayerContainer',{videoId,playerVars:{rel:0,playsinline:1},events:{onReady:()=>{if(withPopups){pollInterval=setInterval(()=>{if(!ytPlayer||typeof ytPlayer.getCurrentTime!=='function')return;checkTimestamps(ytPlayer.getCurrentTime(),()=>ytPlayer.pauseVideo(),()=>ytPlayer.playVideo())},400)}}}})};if(window.YT&&window.YT.Player)start();else window.onYouTubeIframeAPIReady=start}function extractYouTubeId(url){const m=String(url||'').match(/(?:embed\/|v=|youtu\.be\/|shorts\/|live\/)([A-Za-z0-9_-]{6,})/);return m?m[1]:url}function stopPolling(){if(pollInterval){clearInterval(pollInterval);pollInterval=null}}function checkTimestamps(currentTime,pauseFn,resumeFn){Object.entries(timestamps||{}).forEach(([idx,sec])=>{if(!firedTimestamps.has(idx)&&currentTime>=sec){firedTimestamps.add(idx);pauseFn();showPopupQuestion(parseInt(idx,10),resumeFn)}})}function playTone(freqs,dur,vol){try{const ctx=new(window.AudioContext||window.webkitAudioContext);freqs.forEach((f,i)=>{const osc=ctx.createOscillator(),gain=ctx.createGain();osc.type='sine';osc.frequency.value=f;const t0=ctx.currentTime+i*dur;gain.gain.setValueAtTime(vol,t0);gain.gain.exponentialRampToValueAtTime(.0001,t0+dur);osc.connect(gain);gain.connect(ctx.destination);osc.start(t0);osc.stop(t0+dur)})}catch(e){}}function launchConfetti(container){const colors=['#1E8F5F','#B8860B','#1E5F5A','#59C29A','#E1F6EB'];for(let i=0;i<20;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${40+Math.random()*20}%;bottom:18%;width:6px;height:10px;background:${colors[i%colors.length]};border-radius:2px`;container.appendChild(p);const dx=(Math.random()-.5)*160,dy=-(110+Math.random()*110),rot=(Math.random()-.5)*600;const anim=p.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:`translate(${dx}px, ${dy}px) rotate(${rot}deg)`,opacity:0}],{duration:900+Math.random()*400,easing:'cubic-bezier(.15,.6,.4,1)'});anim.onfinish=()=>p.remove()}}function updatePopupSizing(stageEl){const rect=stageEl.getBoundingClientRect();stageEl.style.setProperty('--popup-height',rect.height>rect.width?'75%':'80%')}function showPopupQuestion(idx,resumeFn){const overlay=document.getElementById('popupOverlay'),q=questions[idx];if(!overlay||!q)return;overlay.innerHTML='';overlay.classList.remove('dull');const card=document.createElement('div');card.className='popup-card card';card.innerHTML=`<div class="qnum">Question ${idx+1}</div><div class="qtext">${escapeHtml(q.q)}</div><div id="popupOptions"></div><div class="explanation" id="popupExplanation">${q.explanation?escapeHtml(q.explanation):''}</div>`;overlay.appendChild(card);requestAnimationFrame(()=>overlay.classList.add('show'));const list=document.getElementById('popupOptions'),letters=['A','B','C','D','E','F'];let popupAnswered=false;(q.options||[]).forEach((opt,i)=>{const div=document.createElement('div');div.className='option';div.innerHTML=`<span class="letter">${letters[i]}</span><span>${escapeHtml(opt)}</span>`;div.onclick=()=>{if(popupAnswered)return;popupAnswered=true;const allOpts=list.querySelectorAll('.option');allOpts.forEach(o=>o.classList.add('disabled'));if(i===q.correct){div.classList.add('correct-glow');playTone([660,880],.11,.05);launchConfetti(overlay)}else{div.classList.add('wrong-shake');if(allOpts[q.correct])allOpts[q.correct].classList.add('correct-glow');allOpts.forEach((o,oi)=>{if(oi!==i&&oi!==q.correct)o.classList.add('faded')});playTone([220],.16,.045)}if(q.explanation)document.getElementById('popupExplanation').classList.add('show');setTimeout(()=>{overlay.classList.add('dull');setTimeout(()=>{overlay.classList.remove('show');setTimeout(()=>{overlay.innerHTML='';resumeFn()},500)},320)},2000)};list.appendChild(div)})}function renderQuestion(){answered=false;const q=questions[current];document.getElementById('progressFill').style.width=Math.round(current/questions.length*100)+'%';const card=document.createElement('div');card.className='card';card.innerHTML=`<div class="qnum">Question ${current+1} of ${questions.length}</div><div class="qtext">${escapeHtml(q.q)}</div><div id="optionsList"></div><div class="explanation" id="explanation">${q.explanation?escapeHtml(q.explanation):''}</div><div class="next-row"><button class="next-btn" id="nextBtn">${current===questions.length-1?'See results':'Next question'}</button></div>`;document.getElementById('quizArea').innerHTML='';document.getElementById('quizArea').appendChild(card);const list=document.getElementById('optionsList'),letters=['A','B','C','D','E','F'];(q.options||[]).forEach((opt,i)=>{const div=document.createElement('div');div.className='option';div.innerHTML=`<span class="letter">${letters[i]}</span><span>${escapeHtml(opt)}</span>`;div.onclick=()=>selectOption(i,div);list.appendChild(div)});document.getElementById('nextBtn').onclick=()=>{current++;if(current>=questions.length)renderResult();else renderQuestion()}}function selectOption(i,el){if(answered)return;answered=true;const q=questions[current],allOptions=document.querySelectorAll('#optionsList .option');allOptions.forEach(o=>o.classList.add('disabled'));if(i===q.correct){el.classList.add('correct-glow');score++}else{el.classList.add('wrong-shake');if(allOptions[q.correct])allOptions[q.correct].classList.add('correct-glow');allOptions.forEach((o,idx)=>{if(idx!==i&&idx!==q.correct)o.classList.add('faded')})}if(q.explanation)document.getElementById('explanation').classList.add('show');document.getElementById('nextBtn').classList.add('show')}function renderResult(){document.getElementById('progressFill').style.width='100%';const pct=Math.round(score/questions.length*100),card=document.createElement('div');card.className='card result-card';card.innerHTML=`<div class="score">${score}/${questions.length}</div><div class="label">${pct}% correct</div><button class="retry-btn" id="retryBtn">Try again</button>`;document.getElementById('quizArea').innerHTML='';document.getElementById('quizArea').appendChild(card);document.getElementById('retryBtn').onclick=()=>{current=0;score=0;renderQuestion()}}function escapeHtml(str){const d=document.createElement('div');d.textContent=str;return d.innerHTML}loadQuiz();
</script>
</body>
</html>
