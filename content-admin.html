<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdeaKDC - Static Content Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--ink:#1c2321;--paper:#fafaf7;--panel:#fff;--line:#e6e2d8;--teal:#1e5f5a;--teal-light:#e4f0ee;--grey:#8e8a80;--grey-light:#f1efea;--danger:#b23a2e;--radius:10px}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--paper);color:var(--ink)}header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:var(--panel);border-bottom:1px solid var(--line)}header h1{font-size:19px;font-weight:800;margin:0}header h1 span{color:var(--teal)}.status{font-family:monospace;font-size:12px;color:var(--grey)}.banner{background:#fbf2dc;border-bottom:1px solid #ebd9a0;padding:10px 28px;font-size:12.5px;color:#7a5c00}.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 62px)}.ladder{border-right:1px solid var(--line);padding:22px 18px;background:var(--panel)}.step{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:8px;margin-bottom:2px;cursor:pointer}.step:hover{background:var(--grey-light)}.step.active{background:var(--teal-light)}.dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0;background:var(--grey)}.step.filled .dot{background:var(--teal)}.label{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--grey);font-weight:800}.value{font-size:13.5px;font-weight:600;color:var(--ink)}.empty .value{color:var(--grey);font-style:italic}main{padding:28px}.picker-panel,.upload-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:20px}.picker-panel h2,.upload-panel h2{font-size:15px;margin:0 0 14px}.eyebrow{font-size:11px;color:var(--grey);font-weight:700;text-transform:uppercase;letter-spacing:.06em}.item-grid{display:flex;flex-wrap:wrap;gap:8px}.item-chip{display:flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--line);border-radius:999px;font-size:13.5px;font-weight:700;cursor:pointer;background:var(--paper);transition:.12s}.item-chip:hover{border-color:var(--teal)}.item-chip.selected{background:var(--teal);color:#fff;border-color:var(--teal)}.item-chip.has-content .dot,.item-chip.selected .dot{background:#59c29a}.add-chip{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;border:1px dashed var(--grey);font-size:13.5px;color:var(--grey);cursor:pointer;margin-top:12px;width:max-content}.add-row{display:none;gap:8px;margin-top:12px}.add-row.open{display:flex}.add-row input{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13.5px}.add-row button,.save-btn,.export-btn{padding:10px 16px;border:0;border-radius:8px;background:var(--ink);color:#fff;font-size:13px;font-weight:800;cursor:pointer}.empty-note,.placeholder{color:var(--grey);font-size:13px;font-style:italic}.placeholder{padding:30px 0;text-align:center}.sub{font-size:12.5px;color:var(--grey);margin-bottom:18px}.node-id{font-family:monospace;font-size:11px;color:var(--grey);margin-bottom:14px}.status-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:800;margin-bottom:16px}.status-pill.active{background:var(--teal-light);color:var(--teal)}.status-pill.inactive{background:var(--grey-light);color:var(--grey)}.field{margin-bottom:16px}.field label{display:block;font-size:12.5px;font-weight:800;margin-bottom:6px}.field input[type=text],.field input[type=url]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:13.5px}.file-drop{border:1.5px dashed var(--line);border-radius:8px;padding:20px;text-align:center;cursor:pointer}.file-drop:hover,.file-drop.has-file{border-color:var(--teal)}.file-drop.has-file{background:var(--teal-light)}.file-drop input{display:none}.fname{font-size:13px;font-family:monospace;color:var(--teal)}.hint,.qcount{font-size:12.5px;color:var(--grey)}.save-row{display:flex;gap:10px;align-items:center;margin-top:20px;flex-wrap:wrap}.save-btn{background:var(--teal)}.save-msg{font-size:12.5px;color:var(--teal)}.save-msg.error{color:var(--danger)}.export-bar{position:sticky;bottom:0;background:var(--panel);border-top:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px}.changes{font-size:12.5px;color:var(--grey)}.export-btn:disabled{background:var(--grey);cursor:not-allowed}@media(max-width:800px){.layout{grid-template-columns:1fr}.ladder{border-right:0;border-bottom:1px solid var(--line)}header,.banner,main,.export-bar{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<header><h1>IdeaKDC <span>Content Admin</span> <small style="font-weight:400;font-size:12px;color:#8e8a80">static export</small></h1><div class="status" id="connStatus">loading manifest...</div></header><div class="banner" id="banner"></div><div class="layout"><nav class="ladder" id="ladder"></nav><main><div id="pickerArea"></div><div id="uploadArea"></div></main></div><div class="export-bar"><div class="changes" id="changesLabel">No changes yet.</div><button class="export-btn" id="exportBtn" disabled>Download changes (.zip)</button></div>
<script>
const MANIFEST_URL='./data/manifest.json';const LEVELS=[{type:'class',label:'Class',key:'classes'},{type:'subject',label:'Subject',key:'subjects'},{type:'book',label:'Book',key:'books',optional:true},{type:'chapter',label:'Chapter',key:'chapters',uploadable:true},{type:'topic',label:'Topic',key:'topics',uploadable:true},{type:'subtopic',label:'Subtopic',key:'subtopics',uploadable:true}];let manifest={classes:[]},selection={},activeLadderIndex=0,pendingBookSkip=false,changedContentFiles={},manifestChanged=false,pendingQuestions=null;
function slugify(str,existingIds){let base=str.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')||'item';let id=base,n=1;while(existingIds.has(id))id=`${base}-${n++}`;return id}function collectAllIds(){const set=new Set;(manifest.classes||[]).forEach(c=>walk(c,set));return set}function walk(node,set){set.add(node.id);['subjects','books','chapters','topics','subtopics'].forEach(k=>(node[k]||[]).forEach(child=>walk(child,set)))}async function loadManifest(){try{const res=await fetch(MANIFEST_URL,{cache:'no-store'});if(!res.ok)throw new Error('not found');manifest=await res.json();document.getElementById('connStatus').textContent='manifest loaded';document.getElementById('banner').textContent='Loaded /data/manifest.json. Changes stay local until you download the zip and push the exported files.'}catch(err){manifest={classes:[]};document.getElementById('connStatus').textContent='empty manifest';document.getElementById('banner').textContent='No /data/manifest.json found, or it is empty. Start adding the tree below.'}renderLadder();renderPicker()}function childrenOf(levelIndex){if(levelIndex===0)return manifest.classes||(manifest.classes=[]);const key=LEVELS[levelIndex].key,parentType=effectiveParentType(levelIndex),parentNode=selection[parentType];if(!parentNode)return[];return parentNode[key]||(parentNode[key]=[])}function effectiveParentType(levelIndex){if(LEVELS[levelIndex].type==='chapter'&&pendingBookSkip)return'subject';return LEVELS[levelIndex-1]?.type}function isActive(node){return!!(node.active||node.video)}function renderLadder(){const ladder=document.getElementById('ladder');ladder.innerHTML='';LEVELS.forEach((lvl,i)=>{if(lvl.type==='book'&&pendingBookSkip)return;const sel=selection[lvl.type],div=document.createElement('div');div.className='step'+(i===activeLadderIndex?' active':'')+(sel?' filled':' empty');div.innerHTML=`<div class="dot"></div><div><div class="label">${lvl.label}</div><div class="value">${sel?escapeHtml(sel.name):'-'}</div></div>`;div.onclick=()=>{if(sel||i<=activeLadderIndex){activeLadderIndex=i;renderPicker();renderLadder()}};ladder.appendChild(div)})}function renderPicker(){const area=document.getElementById('pickerArea');document.getElementById('uploadArea').innerHTML='';const lvl=LEVELS[activeLadderIndex];if(activeLadderIndex>0&&!selection[effectiveParentType(activeLadderIndex)]){area.innerHTML=`<div class="placeholder">Select a ${LEVELS[activeLadderIndex-1].label} first.</div>`;return}const children=childrenOf(activeLadderIndex),panel=document.createElement('div');panel.className='picker-panel';panel.innerHTML=`<h2><span class="eyebrow">Step ${activeLadderIndex+1}</span> Select ${lvl.label}</h2>`;const grid=document.createElement('div');grid.className='item-grid';if(!children.length&&lvl.type!=='book'){const note=document.createElement('div');note.className='empty-note';note.textContent=`No ${lvl.label.toLowerCase()}s yet. Add the first one below.`;panel.appendChild(note)}children.forEach(child=>{const chip=document.createElement('div');chip.className='item-chip';if(lvl.uploadable&&isActive(child))chip.classList.add('has-content');chip.innerHTML=lvl.uploadable?`<span class="dot"></span> ${escapeHtml(child.name)}`:escapeHtml(child.name);if(selection[lvl.type]?.id===child.id)chip.classList.add('selected');chip.onclick=()=>selectItem(lvl.type,child);grid.appendChild(chip)});if(lvl.type==='book'){const skipChip=document.createElement('div');skipChip.className='item-chip';skipChip.style.fontStyle='italic';skipChip.textContent=children.length?'No book - go straight to chapters':'This subject has no books - skip';skipChip.onclick=()=>{pendingBookSkip=true;selection.book=null;activeLadderIndex=3;renderLadder();renderPicker()};grid.appendChild(skipChip)}panel.appendChild(grid);const addChip=document.createElement('div');addChip.className='add-chip';addChip.textContent=`+ Add ${lvl.label.toLowerCase()}`;const addRow=document.createElement('div');addRow.className='add-row';addRow.innerHTML=`<input type="text" placeholder="${lvl.label} name" id="newNameInput"><button id="addBtn">Add</button>`;addChip.onclick=()=>addRow.classList.toggle('open');panel.appendChild(addChip);panel.appendChild(addRow);area.innerHTML='';area.appendChild(panel);document.getElementById('addBtn').onclick=()=>{const val=document.getElementById('newNameInput').value.trim();if(!val)return;const id=slugify(val,collectAllIds()),node={id,name:val};if(lvl.type==='chapter')node.topics=[];if(lvl.type==='topic')node.subtopics=[];if(lvl.type==='subject'){node.books=[];node.chapters=[]}if(lvl.type==='book')node.chapters=[];children.push(node);manifestChanged=true;updateChangesLabel();selectItem(lvl.type,node)};if(lvl.uploadable&&selection[lvl.type])renderUploadPanel(selection[lvl.type])}function selectItem(type,item){selection[type]=item;const idx=LEVELS.findIndex(l=>l.type===type);LEVELS.slice(idx+1).forEach(l=>selection[l.type]=null);if(type==='subject')pendingBookSkip=(item.books||[]).length===0;activeLadderIndex=pendingBookSkip&&idx===1?3:idx+1;renderLadder();renderPicker()}function renderUploadPanel(node){const area=document.getElementById('uploadArea');pendingQuestions=null;const panel=document.createElement('div');panel.className='upload-panel';panel.innerHTML=`<h2>Upload content - ${escapeHtml(node.name)}</h2><div class="node-id">node id: ${escapeHtml(node.id)}</div><div class="sub">Upload quiz JSON and optional video URL for this section.</div><div class="status-pill ${isActive(node)?'active':'inactive'}" id="statusPill"><span class="dot"></span> ${isActive(node)?'Active':'Inactive'}</div><div class="field"><label>Questions JSON file</label><div class="file-drop ${node.active?'has-file':''}" id="fileDrop"><input type="file" id="jsonFile" accept="application/json,.json"><div class="fname" id="fname">${node.active?'Questions already uploaded':'Click to choose a .json file'}</div><div class="hint">Format: {"questions":[{"q":"...","options":["A","B"],"correct":0,"explanation":"..."}]}</div></div><div class="qcount" id="qcount"></div></div><div class="field"><label>Video URL (optional)</label><input type="url" id="videoUrl" placeholder="https://youtube.com/embed/..." value="${escapeAttr(node.videoUrl||'')}"></div><div class="field" id="quizModeField" style="display:${node.videoUrl?'block':'none'}"><label>Quiz type for this video</label><div style="display:flex;gap:16px;font-size:13.5px;flex-wrap:wrap"><label><input type="radio" name="quizMode" value="separate" ${node.quizMode!=='popup'?'checked':''}> Separate quiz</label><label><input type="radio" name="quizMode" value="popup" ${node.quizMode==='popup'?'checked':''}> Popup quiz during video</label></div></div><div id="timestampArea"></div><div class="save-row"><button class="save-btn" id="saveBtn">Stage for export</button><span class="save-msg" id="saveMsg"></span></div>`;area.innerHTML='';area.appendChild(panel);document.getElementById('videoUrl').oninput=e=>{document.getElementById('quizModeField').style.display=e.target.value.trim()?'block':'none'};document.querySelectorAll('input[name=quizMode]').forEach(r=>r.onchange=renderTimestampArea);function renderTimestampArea(){const mode=document.querySelector('input[name=quizMode]:checked')?.value,tsArea=document.getElementById('timestampArea');if(mode!=='popup'||!pendingQuestions?.length){tsArea.innerHTML='';return}const existingTs=node.timestamps||{};tsArea.innerHTML='<div class="field"><label>Set timestamp for each question (mm:ss)</label><div id="tsList"></div></div>';const list=document.getElementById('tsList');pendingQuestions.forEach((q,i)=>{const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:8px';row.innerHTML=`<span style="font-size:12px;color:#8e8a80;width:44px">Q${i+1}</span><span style="font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(q.q)}</span><input type="text" class="ts-input" data-idx="${i}" placeholder="mm:ss" value="${secondsToMMSS(existingTs[i])}" style="width:76px;padding:6px 8px;border:1px solid #e6e2d8;border-radius:6px;font-size:13px">`;list.appendChild(row)})}function secondsToMMSS(sec){if(sec===undefined||sec===null)return'';const m=Math.floor(sec/60),s=Math.floor(sec%60);return`${m}:${String(s).padStart(2,'0')}`}function mmssToSeconds(str){if(!str)return null;const parts=str.split(':').map(p=>parseInt(p,10));if(parts.some(isNaN))return null;return parts.length===2?parts[0]*60+parts[1]:parts[0]}document.getElementById('fileDrop').onclick=()=>document.getElementById('jsonFile').click();document.getElementById('jsonFile').onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader;reader.onload=ev=>{try{const parsed=JSON.parse(ev.target.result);if(!Array.isArray(parsed.questions))throw new Error('Missing questions array');pendingQuestions=parsed.questions;document.getElementById('fname').textContent=file.name;document.getElementById('qcount').textContent=`${parsed.questions.length} questions parsed`;document.getElementById('fileDrop').classList.add('has-file');renderTimestampArea()}catch(err){document.getElementById('qcount').textContent='Invalid JSON: '+err.message;pendingQuestions=null}};reader.readAsText(file)};document.getElementById('saveBtn').onclick=()=>{const videoUrl=document.getElementById('videoUrl').value.trim(),msg=document.getElementById('saveMsg');if(!pendingQuestions?.length&&!videoUrl){msg.textContent='Add a questions file or a video URL first.';msg.className='save-msg error';return}const quizMode=videoUrl?(document.querySelector('input[name=quizMode]:checked')?.value||'separate'):null;let timestamps=null;if(quizMode==='popup'&&pendingQuestions?.length){timestamps={};for(const inp of document.querySelectorAll('.ts-input')){const sec=mmssToSeconds(inp.value.trim());if(inp.value.trim()&&sec===null){msg.textContent=`Invalid timestamp for Q${Number(inp.dataset.idx)+1}. Use mm:ss.`;msg.className='save-msg error';return}if(sec!==null)timestamps[inp.dataset.idx]=sec}const missing=pendingQuestions.length-Object.keys(timestamps).length;if(missing>0){msg.textContent=`${missing} question(s) need timestamp.`;msg.className='save-msg error';return}}node.active=!!(pendingQuestions&&pendingQuestions.length);node.video=!!videoUrl;node.quizMode=quizMode;if(videoUrl)node.videoUrl=videoUrl;if(timestamps)node.timestamps=timestamps;changedContentFiles[node.id]={questions:pendingQuestions||[],videoUrl:videoUrl||null,quizMode,timestamps};manifestChanged=true;msg.textContent='Staged. Download zip and push/export when ready.';msg.className='save-msg';document.getElementById('statusPill').className='status-pill '+(isActive(node)?'active':'inactive');document.getElementById('statusPill').innerHTML=`<span class="dot"></span> ${isActive(node)?'Active':'Inactive'}`;updateChangesLabel();renderPicker()}}function updateChangesLabel(){const n=Object.keys(changedContentFiles).length;document.getElementById('changesLabel').textContent=(manifestChanged||n)?`${n} content file${n===1?'':'s'} staged, manifest updated - ready to export.`:'No changes yet.';document.getElementById('exportBtn').disabled=!(manifestChanged||n)}document.getElementById('exportBtn').onclick=async()=>{const zip=new JSZip;zip.file('manifest.json',JSON.stringify(manifest,null,2));const contentFolder=zip.folder('content');Object.entries(changedContentFiles).forEach(([id,data])=>contentFolder.file(`${id}.json`,JSON.stringify(data,null,2)));const blob=await zip.generateAsync({type:'blob'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ideakdc-data-export.zip';a.click()};function escapeHtml(str){const d=document.createElement('div');d.textContent=String(str||'');return d.innerHTML}function escapeAttr(str){return escapeHtml(str).replace(/"/g,'&quot;')}loadManifest();
</script>
</body>
</html>
